<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadWatch PH - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-card">
  <h2>Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="googleBtn">Login with Google</button>
  <p>Don't have an account? <button id="registerBtn">Register</button></p>
</div>

<script type="module">
  import { login, register, googleLogin } from './auth.js';

  // Attach buttons to functions
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('registerBtn').addEventListener('click', register);
  document.getElementById('googleBtn').addEventListener('click', googleLogin);
</script>

</body>
</html>
