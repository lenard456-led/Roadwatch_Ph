<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadWatch PH</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<header>
<span class="menuBtn" onclick="openMenu()">☰</span>
<h2>RoadWatch PH</h2>
</header>


<div class="sidebar" id="menu">
<button onclick="show('home')">Home</button>
<button onclick="show('submit')">Submit Report</button>
<button onclick="show('mapPage')">Road Map</button>
<button onclick="show('tracking')">Tracking</button>
</div>


<section id="home" class="active">
<div class="card">
<h2>Welcome to RoadWatch PH</h2>
</div>
</section>


<section id="submit">
<div class="card">

<input id="lastname" placeholder="Last Name">
<input id="firstname" placeholder="First Name">
<input id="mi" placeholder="MI">

<input id="email">
<input id="phone">

<input id="locationText">

<button onclick="detectLocation()">
Auto detect
</button>

<div id="reportMap"></div>

<p id="selectedLocation">
No location
</p>

<textarea id="issue"></textarea>

<button onclick="submitReport()"
class="submit">
Submit
</button>

</div>
</section>


<div id="popup">

<div>

<h3>Submitted</h3>

<p id="trackInfo"></p>

<button onclick="closePopup()">Done</button>

<button onclick="newReport()">Again</button>

</div>

</div>


<section id="mapPage">
<div class="card">
<div id="map"></div>
</div>
</section>


<section id="tracking">
<div class="card">
Tracking
</div>
</section>


<!-- IMPORTANT: script at bottom -->

<script src="script.js"></script>

</body>
</html>
