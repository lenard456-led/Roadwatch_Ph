<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RoadWatch PH</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<header>
<span class="menuBtn" onclick="openMenu()">☰</span>
<h2>RoadWatch PH</h2>
</header>

<div class="sidebar" id="menu">

<button onclick="show('home')">Home</button>
<button onclick="show('submit')">Submit Report</button>
<button onclick="show('mapPage')">Road Map</button>
<button onclick="show('tracking')">Tracking</button>

</div>

<!-- HOME -->

<section id="home" class="active">

<div class="card">

<h2>Welcome</h2>

<p>
RoadWatch PH is a citizen powered road monitoring platform
for reporting potholes, cracks, flooding, and road hazards.
</p>

</div>

</section>

<!-- SUBMIT -->

<section id="submit">

<div class="card">

<h2>Submit Road Issue</h2>

<input id="lastname" placeholder="Last Name">
<input id="firstname" placeholder="First Name">
<input id="email" placeholder="Email">

<input id="locationText" placeholder="Road Name">

<button class="detectBtn" onclick="detectLocation()">
Auto Detect Location
</button>

<h3>Select Location</h3>

<div id="reportMap"></div>

<p id="selectedLocation">
No location selected
</p>

<textarea id="issue" placeholder="Describe road issue"></textarea>

<button class="submit" onclick="submitReport()">
Submit Report
</button>

</div>

</section>

<!-- MAP -->

<section id="mapPage">

<div class="card">

<h2>Reported Road Issues</h2>

<div id="map"></div>

</div>

</section>

<!-- TRACKING -->

<section id="tracking">

<div class="card">

<h2>Track Report</h2>

<input id="trackInput" placeholder="Enter Tracking Number">

<button class="submit" onclick="searchTracking()">
Search
</button>

<div id="trackResult"></div>

</div>

</section>

<!-- POPUP -->

<div id="popup">

<div>

<h3>Report Submitted</h3>

<p id="trackInfo"></p>

<button onclick="closePopup()">OK</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
