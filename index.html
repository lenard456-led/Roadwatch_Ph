<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadWatch PH</title>

<!-- STYLE -->
<link rel="stylesheet" href="style.css">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
  <span class="menuBtn" onclick="toggleMenu()">☰</span>
  <h2>RoadWatch PH</h2>
  <button id="logoutBtn" style="margin-left:auto">Logout</button>
</header>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar" id="menu">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('submit')">Submit Report</button>
</div>

<!-- ===== HOME HERO + GALLERY ===== -->
<section id="home" class="hero">
  <div class="hero-carousel">
    <div class="carousel-slide active" style="background-image:url('https://images.unsplash.com/photo-1581092580497-253c19747a8b?auto=format&fit=crop&w=1470&q=80');"></div>
    <div class="carousel-slide" style="background-image:url('https://images.unsplash.com/photo-1607746882042-944635dfe10e?auto=format&fit=crop&w=1470&q=80');"></div>
    <div class="carousel-slide" style="background-image:url('https://images.unsplash.com/photo-1608889170459-2f8cc8f452ed?auto=format&fit=crop&w=1470&q=80');"></div>
    <div class="carousel-slide" style="background-image:url('https://images.unsplash.com/photo-1549924231-f129b911e442?auto=format&fit=crop&w=1470&q=80');"></div>
  </div>

  <div class="hero-content">
    <h1>RoadWatch PH</h1>
    <p>Helping communities report potholes, cracks, flooding, and other road hazards to improve road safety and infrastructure maintenance.</p>
    <button class="heroBtn" id="reportBtn">Report a Road Issue</button>
  </div>
</section>

<!-- ===== Other Sections OMITTED for brevity ===== -->

<script type="module">
  // Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { firebaseConfig } from "./firebase-config.js";

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Protect the page
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      // Redirect to login if not logged in
      window.location.href = "login.html";
    }
  });

  // Logout button
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await signOut(auth);
      window.location.href = "login.html";
    } catch (err) {
      console.error("Logout failed:", err);
      alert("Logout failed. Try again.");
    }
  });

  // Hero button
  document.getElementById('reportBtn').addEventListener('click', () => {
    showPage('submit');
  });

</script>

<!-- Your script.js can still be imported as module -->
<script type="module" src="script.js"></script>

</body>
</html>
