<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadWatch PH</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<header>
<span class="menuBtn" onclick="openMenu()">☰</span>
<h2>RoadWatch PH</h2>
</header>

<div class="sidebar" id="menu">
  <button onclick="showPage('home');closeMenu()">Home</button>
  <button onclick="showPage('submit');closeMenu()">Submit Report</button>
</div>


<section id="home" class="active">
<div class="card">
<h2>Welcome to RoadWatch PH</h2>
<p>Report road problems like potholes and flooding.</p>
</div>
</section>


<section id="submit">

<div class="card">

<h2>Submit Road Issue</h2>

<h3>Reporter Information</h3>

<div class="nameRow">

<div class="inputGroup">
<input id="lastname" placeholder=" ">
<label>Last Name</label>
</div>

<div class="inputGroup">
<input id="firstname" placeholder=" ">
<label>First Name</label>
</div>

<div class="inputGroup mi">
<input id="mi" placeholder=" ">
<label>M.I.</label>
</div>

</div>


<div class="contactRow">

<div class="inputGroup">
<input id="email" placeholder=" ">
<label>Email</label>
</div>

<div class="inputGroup">
<input id="phone" placeholder=" ">
<label>Mobile Number</label>
</div>

</div>


<h3>Road Location</h3>

<div class="inputGroup">
<input id="locationText" readonly placeholder=" ">
<label>Street / Road Name</label>
</div>

<button class="detectBtn" onclick="detectLocation()">Auto Detect Location</button>


<h3>Pin Location</h3>

<div id="reportMap"></div>

<p id="selectedLocation">No location selected</p>


<h3>Issue Description</h3>

<div class="inputGroup">
<textarea id="issue" placeholder=" "></textarea>
<label>Describe the issue</label>
</div>


<h3>Upload Photo</h3>

<input type="file" id="photo">

<img id="photoPreview">


<button class="submitBtn" onclick="submitReport()">Submit Report</button>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
