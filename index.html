<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RoadWatch PH</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<header>
<span class="menuBtn" onclick="toggleMenu()">☰</span>
<h2>RoadWatch PH</h2>
</header>


<div class="sidebar" id="menu">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('submit')">Submit Report</button>
</div>



<!-- HOME -->

<section id="home" class="active">

<div class="card">

<h2>Welcome to RoadWatch PH</h2>

<p>
Report potholes, cracks, flooding, and road hazards.
</p>

</div>

</section>



<!-- SUBMIT REPORT -->

<section id="submit">

<div class="card">

<h2>Submit Road Issue</h2>

<h3>Reporter Information</h3>

<div class="row">

<input id="lastname" placeholder="Last Name">
<input id="firstname" placeholder="First Name">
<input id="mi" placeholder="M.I.">

</div>

<div class="row">

<input id="email" placeholder="Email">
<input id="phone" placeholder="Mobile Number">

</div>


<h3>Road Location</h3>

<input id="locationText" placeholder="Street / Road Name" readonly>

<button class="detectBtn" onclick="detectLocation()">Auto Detect Location</button>


<h3>Select Location</h3>

<div id="reportMap"></div>

<p id="selectedLocation">No location selected</p>


<h3>Road Issue</h3>

<textarea id="issue" placeholder="Describe the issue"></textarea>


<h3>Upload Photo</h3>

<input type="file" id="photo">

<img id="photoPreview">


<button class="submitBtn" onclick="submitReport()">Submit Report</button>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
