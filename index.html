<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadWatch PH</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Firebase + Scripts -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Redirect to login if not logged in
onAuthStateChanged(auth, user => {
  if (!user) window.location.href = "login.html";
});
</script>
</head>

<body>

<header>
  <span class="menuBtn" onclick="toggleMenu()">☰</span>
  <h2>RoadWatch PH</h2>
  <button onclick="import('./auth.js').then(m => m.logout())" style="margin-left:auto">Logout</button>
</header>

<div class="sidebar" id="menu">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('submit')">Submit Report</button>
</div>

<!-- HOME HERO -->
<section id="home" class="hero">
  <div class="hero-carousel">
    <div class="carousel-slide active" style="background-image:url('https://images.unsplash.com/photo-1581092580497-253c19747a8b?auto=format&fit=crop&w=1470&q=80');"></div>
    <div class="carousel-slide" style="background-image:url('https://images.unsplash.com/photo-1607746882042-944635dfe10e?auto=format&fit=crop&w=1470&q=80');"></div>
    <div class="carousel-slide" style="background-image:url('https://images.unsplash.com/photo-1608889170459-2f8cc8f452ed?auto=format&fit=crop&w=1470&q=80');"></div>
    <div class="carousel-slide" style="background-image:url('https://images.unsplash.com/photo-1549924231-f129b911e442?auto=format&fit=crop&w=1470&q=80');"></div>
  </div>

  <div class="hero-content">
    <h1>RoadWatch PH</h1>
    <p>Helping communities report potholes, cracks, flooding, and other road hazards to improve road safety.</p>
    <button class="heroBtn" onclick="showPage('submit')">Report a Road Issue</button>
  </div>
</section>

<!-- ROAD ISSUE GALLERY -->
<section class="road-gallery">
  <h2>Common Road Issues</h2>
  <div class="gallery-grid">
    <img src="https://images.unsplash.com/photo-1581092580497-253c19747a8b?auto=format&fit=crop&w=800&q=80" alt="Pothole">
    <img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?auto=format&fit=crop&w=800&q=80" alt="Flooded road">
    <img src="https://images.unsplash.com/photo-1608889170459-2f8cc8f452ed?auto=format&fit=crop&w=800&q=80" alt="Cracked asphalt">
    <img src="https://images.unsplash.com/photo-1549924231-f129b911e442?auto=format&fit=crop&w=800&q=80" alt="Damaged road">
  </div>
</section>

<!-- SUBMIT REPORT SECTION -->
<section id="submit">
  <div class="card">
    <h2>Submit Road Issue</h2>
    <div class="row">
      <input id="lastname" placeholder="Last Name">
      <input id="firstname" placeholder="First Name">
      <input id="mi" placeholder="M.I.">
    </div>
    <div class="row">
      <input id="email" placeholder="Email">
      <input id="phone" placeholder="Mobile Number">
    </div>
    <input id="locationText" placeholder="Street / Road Name">
    <button class="detectBtn" onclick="detectLocation()">Auto-detect Location</button>
    <div id="reportMap"></div>
    <p id="selectedLocation">No location selected</p>
    <textarea id="issue" placeholder="Describe the issue"></textarea>
    <input type="file" id="photo">
    <img id="photoPreview">
    <button class="submitBtn" onclick="submitReport()">Submit Report</button>
  </div>
</section>

<!-- POPUP -->
<div id="popup">
  <div class="popup-card">
    <h3>Report Submitted Successfully!</h3>
    <p id="trackInfo" style="font-weight:bold; font-size:18px; margin:15px 0;"></p>
    <div style="display:flex; gap:15px; margin-top:10px;">
      <button onclick="closePopup()">Done</button>
      <button onclick="newReport()">Submit Another</button>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
