<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadWatch PH</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<header>
<span class="menuBtn" onclick="openMenu()">☰</span>
<h2>RoadWatch PH</h2>
</header>

<div class="sidebar" id="menu">
<button onclick="show('home')">Home</button>
<button onclick="show('submit')">Submit Report</button>
<button onclick="show('mapPage')">Road Map</button>
<button onclick="show('tracking')">Tracking</button>
</div>


<section id="home" class="active">
<div class="card">
<h2>Welcome to RoadWatch PH</h2>
<p>
Citizen-powered road monitoring platform.
</p>
</div>
</section>


<section id="submit">
<div class="card">

<h2>Submit Road Issue</h2>

<h3>Reporter Information</h3>

<div class="row">
<input id="lastname" placeholder="Last Name">
<input id="firstname" placeholder="First Name">
<input id="mi" placeholder="M.I.">
</div>

<input id="email" placeholder="Email Address">
<input id="phone" placeholder="Phone Number">

<h3>Road Location</h3>

<input id="locationText" placeholder="Street / Road Name">

<button onclick="detectLocation()"
class="autoBtn">
Auto-detect My Location
</button>

<h3>Pin Location on Map</h3>

<div id="reportMap"></div>

<p id="selectedLocation">
No location selected
</p>

<h3>Road Issue</h3>

<textarea id="issue"></textarea>

<input type="file" id="photo">

<button class="submit"
onclick="submitReport()">

Submit Report

</button>

</div>
</section>


<div id="popup">

<div>

<h3>Report Submitted Successfully!</h3>

<p id="trackInfo"></p>

<button onclick="closePopup()">
Done
</button>

<button onclick="newReport()">
Submit Another Report
</button>

</div>

</div>


<section id="mapPage">

<div class="card">

<h2>Reported Road Issues Map</h2>

<div id="map"></div>

</div>

</section>


<section id="tracking">

<div class="card">

<h2>Tracking</h2>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
